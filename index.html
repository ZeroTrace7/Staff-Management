<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sun Associates Attendance</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- VIEW: STEP 1 (Light Theme) -->
  <div id="view-step1" class="app-layout" style="background: white; color: black; padding: 16px;">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-6" style="margin-top: 8px;">
      <div class="flex items-center gap-2">
        <span style="font-size: 1.25rem; font-weight: 500; cursor: pointer;">←</span>
        <div class="font-bold text-2xl" style="letter-spacing: -0.5px;">Sun Associates<span class="brand-period">.</span></div>
      </div>
      <button style="background: black; color: white; border-radius: 8px; padding: 6px 12px; font-size: 0.75rem; font-weight: 600; border: none; display: flex; align-items: center; gap: 4px;">
        <span>📞</span> Need Help?
      </button>
    </div>

    <div class="app-main flex flex-col justify-between" style="padding: 0;">
      <div>
        <!-- Segmented Progress Bar -->
        <div class="flex gap-2 mb-2">
          <div style="height: 4px; flex: 1; background: #F97316; border-radius: 4px;"></div>
          <div style="height: 4px; flex: 1; background: #E5E7EB; border-radius: 4px;"></div>
          <div style="height: 4px; flex: 1; background: #E5E7EB; border-radius: 4px;"></div>
        </div>
        <div class="text-xs text-muted mb-6">Step 1 of 3</div>

        <!-- Headings -->
        <h1 class="font-bold mb-2" style="font-size: 1.75rem; letter-spacing: -0.5px;">Create account</h1>
        <p class="text-muted text-sm mb-6">Choose how want you to start</p>

        <!-- Selection Cards -->
        <div class="flex gap-4 mb-6">
          <!-- Employee Card (Inactive) -->
          <div class="selection-card inactive" onclick="selectRole('employee')">
            <div class="selection-icon" style="opacity: 0;">👤</div>
            <div class="font-bold" style="font-size: 1.1rem; margin-bottom: 4px;">Employee</div>
            <div class="text-xs text-muted" style="color: #9CA3AF;">Join your team</div>
          </div>
          
          <!-- Business Card (Active) -->
          <div class="selection-card active" onclick="selectRole('business')">
            <div class="selection-icon" style="color: #60A5FA;">🏢</div>
            <div class="font-bold" style="font-size: 1.1rem; margin-bottom: 4px;">Business</div>
            <div class="text-xs" style="color: #9CA3AF;">Create a workspace</div>
          </div>
        </div>

        <!-- Checkbox -->
        <div class="flex items-start gap-3 mb-6">
        <input type="checkbox" id="usage" class="custom-checkbox mt-1">
        <label for="usage" class="text-sm">Have you ever used a app for attendance and payroll or first time user.</label>
      </div>

      <button class="btn-primary" onclick="handleStep1Continue()">Continue</button>
    </div>
  </div>

</body>
</html>
